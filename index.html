<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue to Black Gradient</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Style the body to fill the entire screen with the gradient */
        body {
            min-height: 100vh;
            /* to bottom right creates the diagonal direction */
            background: linear-gradient(to bottom right, #0000ff, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Optional card style just to give the page some content */
        .content {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Hello World</h1>
        <p>Your beautiful gradient website is ready.</p>
    </div>

</body>
</html>
