<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Midnight Gradient</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Deep, dark gradient from top-left to bottom-right across the whole screen */
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #0a1128, #000000);
        }
    </style>
</head>
