<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requiemx — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a; /* Clean dark-gray background */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* --- LEFT SIDE NAVIGATION AREA --- */
        .left-menu {
            position: absolute;
            top: 30px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Logo styling */
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        /* Menu grouping */
        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .account-header {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Clickable Overview Button */
        .btn-overview {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            width: max-content;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-overview:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }


        /* --- CENTER WORKSPACE PANELS --- */
        .main-workspace {
            margin-left: 240px; /* Offset to clear the left menu position */
            margin-top: 100px;
            padding: 40px;
            width: calc(100% - 240px);
            max-width: 1100px;
            overflow-y: auto;
            height: calc(100vh - 100px);
        }

        /* Account Overview Section Title */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            letter-spacing: -0.2px;
        }

        /* Horizontal Card Grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
        }

        /* Custom Dark Gray Cards */
        .overview-card {
            background: #242424; /* Solid slightly lighter gray background */
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 120px;
        }

        .card-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
        }

        .card-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: auto;
        }

        .card-subtext {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: -4px;
        }

        /* Icons in Top-Right corner of each card */
        .card-icon {
            position: absolute;
            top: 24px;
            right: 24px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 1.1rem;
        }


        /* --- TOP & BOTTOM RIGHT CORNERS --- */
        /* Top-Right Sign Out Button */
        .btn-signout {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-signout:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Bottom-Right User Indicator */
        .user-status {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        .user-status span {
            color: #ffffff;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="left-menu">
        <a href="index.html" class="logo">requiemx</a>
        
        <div class="menu-group">
            <div class="account-header">Account</div>
            <button class="btn-overview" id="overviewBtn">
                <span>👤</span> Overview
            </button>
        </div>
    </div>

    <main class="main-workspace">
        <h2 class="section-title">Account Overview</h2>
        
        <div class="overview-grid">
            <div class="overview-card">
                <span class="card-icon">✏️</span>
                <div class="card-label">Username</div>
                <div class="card-value" id="cardUsername">...</div>
                <div class="card-subtext">Change available now</div>
            </div>

            <div class="overview-card">
                <span class="card-icon">👤</span>
                <div class="card-label">Alias</div>
                <div class="card-value">0 aliases used</div>
                <div class="card-subtext">1 alias slots remaining</div>
            </div>

            <div class="overview-card">
                <span class="card-icon">#</span>
                <div class="card-label">UID</div>
                <div class="card-value" id="cardUid">...</div>
                <div class="card-subtext" id="uidSubtext">Loading position...</div>
            </div>
        </div>
    </main>
    
    <button class="btn-signout" id="signOutBtn">Sign Out</button>

    <div class="user-status">
        signed in as <span id="userDisplay">...</span>
    </div>

    <script>
        const SUPABASE_URL = "https://vhozskumzytvbidirism.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3pza3Vtenl0dmJpZGlyaXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjgwNjEsImV4cCI6MjA5OTYwNDA2MX0.1t82AH9lXFJ18kpNOcHHH_8Xo2mvD-BeHrPjFbO5EK4"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const signOutBtn = document.getElementById('signOutBtn');
        const overviewBtn = document.getElementById('overviewBtn');
        
        const userDisplay = document.getElementById('userDisplay');
        const cardUsername = document.getElementById('cardUsername');
        const cardUid = document.getElementById('cardUid');
        const uidSubtext = document.getElementById('uidSubtext');

        // Verify Session and Fetch Real User ID Index
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
                return;
            }
            const cleanUsername = session.user.email.split('@')[0];
            
            userDisplay.innerText = cleanUsername;
            cardUsername.innerText = cleanUsername;

            // REAL DATABASE UID LOGIC:
            // Since we cannot read auth.users, we save a public user profile tracking registration order.
            // Let's upsert this user's current session into a public profiles table and fetch their real sequence ID.
            try {
                const userUuid = session.user.id;
                const userEmail = session.user.email;

                // 1. Ensure a profile row exists for this user in your public "profiles" database table
                await supabaseClient
                    .from('profiles')
                    .upsert({ id: userUuid, username: cleanUsername, email: userEmail }, { onConflict: 'id' });

                // 2. Fetch all profiles ordered by creation sequence to determine their exact registration order (1st, 2nd, etc.)
                const { data: profiles, error } = await supabaseClient
                    .from('profiles')
                    .select('id')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                // Find the index of the logged-in user in the registration sequence
                const index = profiles.findIndex(profile => profile.id === userUuid);
                const realUid = index !== -1 ? index + 1 : 1;

                cardUid.innerText = realUid;
                uidSubtext.innerText = realUid === 1 ? "The very first user" : `Among the first ${realUid}`;
            } catch (err) {
                console.warn("Table fallback: If you haven't created a 'profiles' table yet, here is a fallback sequence ID:", err);
                cardUid.innerText = "1";
                uidSubtext.innerText = "The very first user";
            }
        }

        checkSession();

        // Sign Out Event
        signOutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
