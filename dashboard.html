<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requiemx — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #111111;
            --bg-card: #181818;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #8b5cf6; /* Purple accent similar to guns.lol */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 260px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-section {
            margin-bottom: 32px;
        }

        .nav-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-item.active {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        /* Sidebar Footer */
        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        
        .user-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
        }

        .user-info h4 {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .user-info span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .btn-logout {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-logout:hover {
            border-color: #ff4444;
            color: #ff4444;
            background: rgba(255, 68, 68, 0.05);
        }


        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 40px;
            display: none; /* Hidden by default until view is selected */
        }

        .main-content.active {
            display: block;
        }

        /* Overview View */
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }


        /* --- CUSTOMIZE VIEW (The Guns.lol Style) --- */
        .customize-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Asset Uploaders Row */
        .assets-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .asset-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .asset-label { font-size: 0.9rem; font-weight: 600; color: #ddd; }
        
        .upload-zone {
            background: rgba(0,0,0,0.3);
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 8px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.05);
        }

        .upload-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
        }

        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            gap: 8px;
            z-index: 2;
        }
        
        .upload-icon { font-size: 24px; opacity: 0.5; }

        input[type="file"] { display: none; }

        /* Live Preview Section */
        .preview-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 500px;
            overflow: hidden;
        }

        /* The Profile Preview Container */
        .profile-preview-wrapper {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
        }

        /* Simulated Background Image in Preview */
        .preview-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: opacity 0.3s ease;
        }
        
        /* Overlay to ensure text readability if bg is busy */
        .preview-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .pfp-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #333;
            border: 4px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 10;
            overflow: hidden;
        }
        
        .pfp-preview img { width: 100%; height: 100%; object-fit: cover; }

        .username-preview {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .bio-preview {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            margin-bottom: 30px;
            z-index: 10;
            text-align: center;
        }

        /* Mock Links */
        .mock-link {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            text-align: center;
            font-weight: 600;
            margin-bottom: 12px;
            transition: transform 0.2s;
            z-index: 10;
            cursor: pointer;
        }
        
        .mock-link:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }

        /* Settings Grid below preview */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 40px;
            width: 100%;
        }

        .setting-group {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .setting-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: black;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
        }

    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <a href="#" class="logo">⚡ requiemx</a>
        
        <div class="nav-section">
            <div class="nav-header">Menu</div>
            <button class="nav-item active" onclick="switchTab('overview')">
                <span>📊</span> Overview
            </button>
            <button class="nav-item" onclick="switchTab('customize')">
                <span>🎨</span> Customise
            </button>
            <button class="nav-item" style="opacity: 0.5; pointer-events: none;">
                <span>🔗</span> Links
            </button>
        </div>

        <div class="nav-section">
            <div class="nav-header">Settings</div>
            <button class="nav-item" style="opacity: 0.5; pointer-events: none;">
                <span>💎</span> Premium
            </button>
        </div>

        <div class="sidebar-footer">
            <div class="user-pill">
                <div class="avatar-small"></div>
                <div class="user-info">
                    <h4 id="sideUsername">User</h4>
                    <span>Free Plan</span>
                </div>
            </div>
            <button class="btn-logout" id="signOutBtn">Sign Out</button>
        </div>
    </nav>

    <!-- MAIN CONTENT: OVERVIEW -->
    <main id="view-overview" class="main-content active">
        <h1 class="page-title">Account Overview</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Profile Views</div>
                <div class="stat-value">1,204</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Link Clicks</div>
                <div class="stat-value">340</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" style="color: #4ade80;">Active</div>
            </div>
        </div>
    </main>

    <!-- MAIN CONTENT: CUSTOMIZE -->
    <main id="view-customize" class="main-content">
        <div class="customize-container">
            
            <!-- Top Assets Section -->
            <h2 class="section-header">Assets Uploader</h2>
            <div class="assets-row">
                
                <!-- Background Upload -->
                <div class="asset-card">
                    <div class="asset-label">Background</div>
                    <label for="bgUpload" class="upload-zone" id="bgZone">
                        <div class="upload-placeholder" id="bgPlaceholder">
                            <span class="upload-icon">🖼️</span>
                            <span>Click to upload</span>
                        </div>
                        <img id="bgPreviewImg" src="" alt="" style="display:none;">
                    </label>
                    <input type="file" id="bgUpload" accept="image/*">
                </div>

                <!-- Avatar Upload -->
                <div class="asset-card">
                    <div class="asset-label">Profile Avatar</div>
                    <label for="avatarUpload" class="upload-zone" id="avatarZone">
                        <div class="upload-placeholder" id="avatarPlaceholder">
                            <span class="upload-icon">👤</span>
                            <span>Click to upload</span>
                        </div>
                        <img id="avatarPreviewImg" src="" alt="" style="display:none;">
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*">
                </div>

                 <!-- Audio Placeholder -->
                 <div class="asset-card">
                    <div class="asset-label">Audio</div>
                    <div class="upload-zone" style="cursor: default;">
                        <div class="upload-placeholder">
                            <span class="upload-icon">🎵</span>
                            <span>Coming Soon</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Live Preview Area -->
            <h2 class="section-header">Live Preview</h2>
            <div class="preview-section">
                <!-- Dynamic Background -->
                <div class="preview-bg" id="liveBg"></div>
                <div class="preview-overlay"></div>

                <div class="profile-preview-wrapper">
                    <div class="pfp-preview" id="livePfpContainer">
                         <!-- Default SVG Avatar -->
                         <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="100" height="100" fill="#333"/>
                            <circle cx="50" cy="40" r="18" fill="#555"/>
                            <path d="M20 90C20 70 35 60 50 60C65 60 80 70 80 90" fill="#555"/>
                        </svg>
                    </div>
                    
                    <div class="username-preview" id="liveUsername">username</div>
                    <div class="bio-preview">custom bio goes here...</div>

                    <div class="mock-link">Discord</div>
                    <div class="mock-link">GitHub</div>
                    <div class="mock-link">Spotify</div>
                </div>
            </div>

            <!-- General Customization Inputs -->
            <h2 class="section-header" style="margin-top: 40px;">General Customization</h2>
            <div class="settings-grid">
                <div class="setting-group">
                    <label class="setting-label">Display Name</label>
                    <input type="text" class="input-field" id="inputName" placeholder="Enter name..." oninput="updatePreview()">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Bio / Description</label>
                    <input type="text" class="input-field" id="inputBio" placeholder="Enter bio..." oninput="updatePreview()">
                </div>
            </div>

        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://vhozskumzytvbidirism.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3pza3Vtenl0dmJpZGlyaXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjgwNjEsImV4cCI6MjA5OTYwNDA2MX0.1t82AH9lXFJ18kpNOcHHH_8Xo2mvD-BeHrPjFbO5EK4"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elements
        const signOutBtn = document.getElementById('signOutBtn');
        const sideUsername = document.getElementById('sideUsername');
        const liveUsername = document.getElementById('liveUsername');
        const inputName = document.getElementById('inputName');
        const inputBio = document.getElementById('inputBio');
        const liveBio = document.querySelector('.bio-preview');

        // File Inputs
        const bgUpload = document.getElementById('bgUpload');
        const avatarUpload = document.getElementById('avatarUpload');
        
        // Preview Areas
        const liveBg = document.getElementById('liveBg');
        const livePfpContainer = document.getElementById('livePfpContainer');
        const bgPreviewImg = document.getElementById('bgPreviewImg');
        const avatarPreviewImg = document.getElementById('avatarPreviewImg');
        const bgPlaceholder = document.getElementById('bgPlaceholder');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        // Auth Check
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
                return;
            }
            const user = session.user;
            const cleanUsername = user.email.split('@')[0];
            
            sideUsername.innerText = cleanUsername;
            liveUsername.innerText = cleanUsername;
            inputName.value = cleanUsername;
        }

        checkSession();

        // Tab Switching Logic
        function switchTab(tabName) {
            // Hide all views
            document.querySelectorAll('.main-content').forEach(el => el.classList.remove('active'));
            // Remove active from nav items
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            // Show selected view
            document.getElementById(`view-${tabName}`).classList.add('active');
            
            // Highlight nav item (simple way)
            event.currentTarget.classList.add('active');
        }

        // Update Text Preview
        function updatePreview() {
            liveUsername.innerText = inputName.value || 'username';
            liveBio.innerText = inputBio.value || 'custom bio goes here...';
        }

        // Handle Background Upload
        bgUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Set the main large preview background
                    liveBg.style.backgroundImage = `url(${e.target.result})`;
                    
                    // Set the small thumbnail in the uploader card
                    bgPreviewImg.src = e.target.result;
                    bgPreviewImg.style.display = 'block';
                    bgPlaceholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Handle Avatar Upload
        avatarUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Replace SVG with image tag inside pfp container
                    livePfpContainer.innerHTML = `<img src="${e.target.result}" alt="Avatar">`;
                    
                    // Set thumbnail
                    avatarPreviewImg.src = e.target.result;
                    avatarPreviewImg.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Sign Out
        signOutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
